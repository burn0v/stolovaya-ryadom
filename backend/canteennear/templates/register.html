{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h2 class="text-center mb-4">Регистрация</h2>
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text text-muted small">{{ field.help_text }}</div>
                            {% endif %}
                            {% for error in field.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 mt-3">Создать аккаунт</button>
                </form>
                <div class="mt-3 text-center">
                    <small>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Чтобы поля ввода выглядели как в Bootstrap */
    input { display: block; width: 100%; padding: .375rem .75rem; font-size: 1rem; border: 1px solid #dee2e6; border-radius: .375rem; }
</style>
{% endblock %}
