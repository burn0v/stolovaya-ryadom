{% extends 'base.html' %}

{% block content %}
<div class="hero">
    <h1 class="display-5 fw-bold">Найди столовую рядом</h1>
    <p class="text-muted">Поиск лучших столовых рядом с тобой</p>

    <form action="{% url 'search' %}" method="GET" class="d-flex justify-content-center mt-4">
        <input 
            type="text" 
            name="q" 
            class="form-control w-25 me-2"
            placeholder="Название или адрес..."
            value="{{ query|default:'' }}"
        >
        <button type="submit" class="btn btn-primary">Найти</button>
    </form>
</div>

<div class="container">
    <h3 class="mb-4">Популярные места</h3>
    <div class="row">
        {% for c in canteens %}
        <div class="col-md-4 mb-4">
            <div class="card canteen-card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ c.name }}</h5>
                    <p class="card-text text-muted">📍 {{ c.address }}</p>
                    <p class="fw-bold text-warning">⭐ {{ c.rating }}</p>
                    <a href="{% url 'canteen_detail' c.id %}" class="btn btn-outline-primary btn-sm w-100">Подробнее</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-center">Столовых пока не добавлено.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
