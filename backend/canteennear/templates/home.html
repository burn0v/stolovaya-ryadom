<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>Поиск столовых</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

.hero{
    padding:80px 20px;
    text-align:center;
}

.canteen-card{
    transition:0.2s;
}

.canteen-card:hover{
    transform:scale(1.02);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">🍽 Столовая Рядом</a>
</div>
</nav>


<!-- HERO -->

<div class="hero">

<h1 class="display-5 fw-bold">Найди столовую рядом</h1>
<p class="text-muted">Поиск лучших столовых рядом с тобой</p>

<form method="GET" class="d-flex justify-content-center mt-4">

<input 
type="text" 
name="q" 
class="form-control w-25 me-2"
placeholder="Введите город..."
value="{{ query }}"
>

<button class="btn btn-primary">
Найти
</button>

</form>

</div>


<!-- RESULTS -->

<div class="container">

<div class="row">

{% for c in canteens %}

<div class="col-md-4 mb-4">

<div class="card canteen-card shadow-sm">

<div class="card-body">

<h5 class="card-title">{{ c.name }}</h5>

<p class="card-text">
📍 {{ c.address }}
</p>

<p>
⭐ {{ c.rating }}
</p>

<button class="btn btn-outline-primary btn-sm">
Подробнее
</button>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
