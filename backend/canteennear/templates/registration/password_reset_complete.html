{% extends 'registration/auth_layout.html' %}

{% block title %}Пароль изменён — {{ block.super }}{% endblock %}

{% block auth_heading %}Пароль обновлён{% endblock %}

{% block auth_subtitle %}{% endblock %}

{% block auth_body %}
<div class="text-center">
    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-green-100">
        <svg class="h-7 w-7 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <p class="mt-5 text-sm text-slate-600">
        Теперь вы можете войти с новым паролем.
    </p>
    <a
        href="{% url 'login' %}"
        class="mt-8 inline-flex rounded-lg bg-brand px-5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-brand/25 transition hover:bg-brand-dark"
    >
        Войти
    </a>
</div>
{% endblock %}
