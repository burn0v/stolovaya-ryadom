{% extends 'base.html' %}

{% block content %}
<div class="mx-auto w-full px-4 sm:px-6 {% block auth_width %}max-w-md{% endblock %}">
    <div class="overflow-hidden rounded-2xl border border-slate-200/80 bg-white shadow-xl shadow-slate-200/50">
        <div class="border-b border-slate-100 bg-gradient-to-r from-slate-900 to-slate-800 px-6 py-8 text-center">
            <h1 class="text-2xl font-bold tracking-tight text-white">{% block auth_heading %}{% endblock %}</h1>
            {% block auth_subtitle %}{% endblock %}
        </div>
        <div class="p-6 sm:p-8">
            {% block auth_body %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
