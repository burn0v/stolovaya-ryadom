<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Столовая Рядом{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#ea580c',
                            dark: '#c2410c',
                            light: '#fb923c',
                            muted: '#ffedd5',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        nav: '0 4px 30px -6px rgba(0, 0, 0, 0.55)',
                    },
                },
            },
        };
    </script>
    <style>
        body { min-height: 100vh; }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body class="min-h-full flex flex-col bg-slate-50 text-slate-900 antialiased font-sans">

    <header class="relative sticky top-0 z-50 border-b border-slate-800/90 bg-slate-950/95 shadow-nav backdrop-blur-md">
        <nav class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
            <a href="{% url 'home' %}" class="group flex shrink-0 items-center gap-2.5">
                <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-brand to-brand-dark text-sm font-bold text-white shadow-lg shadow-brand/25 ring-1 ring-white/10 transition group-hover:shadow-brand/40">
                    СР
                </span>
                <span class="text-lg font-semibold tracking-tight text-white">
                    Столовая <span class="text-brand-light">Рядом</span>
                </span>
            </a>

            <button
                type="button"
                id="nav-toggle"
                class="inline-flex items-center justify-center rounded-lg p-2 text-slate-300 ring-1 ring-slate-700/80 transition hover:bg-slate-800 hover:text-white md:hidden"
                aria-expanded="false"
                aria-controls="nav-menu"
                aria-label="Меню"
            >
                <svg class="h-5 w-5" id="nav-icon-open" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg class="hidden h-5 w-5" id="nav-icon-close" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>

            <div id="nav-menu" class="absolute left-0 right-0 top-16 hidden flex-col gap-1 border-b border-slate-800 bg-slate-950/98 px-4 py-4 shadow-lg md:static md:flex md:flex-1 md:flex-row md:items-center md:justify-between md:border-0 md:bg-transparent md:p-0 md:shadow-none">
                <ul class="flex flex-col gap-0.5 md:flex-row md:items-center md:gap-1">
                    <li>
                        <a href="{% url 'home' %}" class="block rounded-lg px-3 py-2.5 text-sm font-medium text-slate-300 transition hover:bg-slate-800/80 hover:text-white md:py-2">
                            Главная
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'reviews_list' %}" class="block rounded-lg px-3 py-2.5 text-sm font-medium text-slate-300 transition hover:bg-slate-800/80 hover:text-white md:py-2">
                            Отзывы
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'search' %}" class="block rounded-lg px-3 py-2.5 text-sm font-medium text-slate-300 transition hover:bg-slate-800/80 hover:text-white md:py-2">
                            Поиск
                        </a>
                    </li>
                </ul>

                <div class="mt-3 flex flex-col gap-2 border-t border-slate-800 pt-3 md:mt-0 md:flex-row md:items-center md:border-0 md:pt-0">
                    {% if user.is_authenticated %}
                        <span class="px-3 text-sm text-slate-400">
                            <span class="font-medium text-slate-200">{{ user.username }}</span>
                        </span>
                        <form action="{% url 'logout' %}" method="post" class="w-full md:w-auto">
                            {% csrf_token %}
                            <button
                                type="submit"
                                class="w-full rounded-lg border border-red-900/60 bg-red-950/40 px-4 py-2 text-sm font-medium text-red-300 transition hover:border-red-700 hover:bg-red-950/70 hover:text-red-200 md:w-auto"
                            >
                                Выйти
                            </button>
                        </form>
                    {% else %}
                        <a
                            href="{% url 'login' %}"
                            class="w-full rounded-lg border border-slate-600 px-4 py-2 text-center text-sm font-medium text-slate-200 transition hover:border-slate-500 hover:bg-slate-800 md:w-auto"
                        >
                            Войти
                        </a>
                        <a
                            href="{% url 'register' %}"
                            class="w-full rounded-lg bg-brand px-4 py-2 text-center text-sm font-semibold text-white shadow-lg shadow-brand/20 transition hover:bg-brand-dark md:w-auto"
                        >
                            Регистрация
                        </a>
                    {% endif %}
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-1 py-8 sm:py-10">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="mt-auto border-t border-slate-200 bg-white py-6">
        <div class="mx-auto max-w-7xl px-4 text-center sm:px-6 lg:px-8">
            <p class="text-sm text-slate-500">
                2026 <span class="font-medium text-slate-700">Столовая Рядом</span> — твой гид по вкусной еде
            </p>
        </div>
    </footer>

    <script>
        (function () {
            var toggle = document.getElementById('nav-toggle');
            var menu = document.getElementById('nav-menu');
            var iconOpen = document.getElementById('nav-icon-open');
            var iconClose = document.getElementById('nav-icon-close');
            if (!toggle || !menu) return;

            toggle.addEventListener('click', function () {
                menu.classList.toggle('hidden');
                var expanded = !menu.classList.contains('hidden');
                toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
                iconOpen.classList.toggle('hidden', expanded);
                iconClose.classList.toggle('hidden', !expanded);
            });

            menu.querySelectorAll('a').forEach(function (link) {
                link.addEventListener('click', function () {
                    if (window.innerWidth >= 768) return;
                    menu.classList.add('hidden');
                    toggle.setAttribute('aria-expanded', 'false');
                    iconOpen.classList.remove('hidden');
                    iconClose.classList.add('hidden');
                });
            });
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
