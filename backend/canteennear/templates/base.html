<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Столовая Рядом{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; min-height: 100vh; }
        .navbar-brand { font-weight: bold; }
        .hero { padding: 60px 20px; text-align: center; }
        .canteen-card { transition: 0.2s; height: 100%; }
        .canteen-card:hover { transform: scale(1.02); }
        /* Стили для того, чтобы футер не прыгал */
        main { flex: 1; }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body class="d-flex flex-column">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">🍽 Столовая Рядом</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'reviews_list' %}">Отзывы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'search' %}">Поиск</a>
                    </li>
                </ul>

                <div class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <span class="nav-item nav-link text-light me-3">
                             👤 <strong>{{ user.username }}</strong>
                        </span>
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">Выйти</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Войти</a>
                        <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Регистрация</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-top py-3 mt-auto">
        <div class="container text-center">
            <span class="text-muted">2026 Столовая Рядом — Твой гид по вкусной еде</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
