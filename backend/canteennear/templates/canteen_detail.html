{% extends 'base.html' %}

{% block title %}{{ canteen.name }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center">
            <h1>{{ canteen.name }}</h1>
            <span class="badge bg-warning text-dark fs-5">⭐ {{ canteen.rating }}</span>
        </div>
        <p class="text-muted">📍 {{ canteen.address }}</p>
        <hr>
        <div class="row">
            <div class="col-md-6">
                <h3>⏰ Время работы</h3>
                <p>{{ canteen.working_hours }}</p>
            </div>
            <div class="col-md-6">
                <h3>🍽 Меню</h3>
                <p>{{ canteen.menu }}</p>
            </div>
        </div>
        <hr>
        <a href="{% url 'home' %}" class="btn btn-secondary">На главную</a>
    </div>
</div>
{% endblock %}
